<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Mandelbrot Symphony</title>\n    <style>\n        body { font-family: Arial, sans-serif; background-color: #000; color: #fff; }\n        canvas { display: block; margin: 0 auto; }\n    </style>\n</head>\n<body>\n    <h1>Mandelbrot Symphony</h1>\n    <canvas id="mandelbrotCanvas"></canvas>\n    <script>\n        const canvas = document.getElementById('mandelbrotCanvas');\n        const ctx = canvas.getContext('2d');\n        canvas.width = window.innerWidth;\n        canvas.height = window.innerHeight;\n        function mandelbrot(c_re, c_im, max_iter) {\n            let z_re = c_re, z_im = c_im;\n            for (let n = 0; n < max_iter; n++) {\n                const z_re2 = z_re * z_re, z_im2 = z_im * z_im;\n                if (z_re2 + z_im2 > 4) return n;\n                z_im = 2 * z_re * z_im + c_im;\n                z_re = z_re2 - z_im2 + c_re;\n            }\n            return max_iter;\n        }\n        function draw() {\n            for (let x = 0; x < canvas.width; x++) {\n                for (let y = 0; y < canvas.height; y++) {\n                    const c_re = (x - canvas.width / 2) / (canvas.width / 4);\n                    const c_im = (y - canvas.height / 2) / (canvas.height / 4);\n                    const m = mandelbrot(c_re, c_im, 100);\n                    const color = m === 100 ? 0 : 255 - Math.floor(m * 255 / 100);\n                    ctx.fillStyle = `rgb(${color}, 0, ${color})`;\n                    ctx.fillRect(x, y, 1, 1);\n                }\n            }\n        }\n        draw();\n    </script>\n</body>\n</html>
