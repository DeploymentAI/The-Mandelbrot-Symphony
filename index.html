<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Musical Mandelbrot • Orbit Melodies</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            height: 100%;
            background: #0a0814;
            overflow: hidden;
            touch-action: manipulation; /* improves touch responsiveness */
        }
        body {
            font-family: system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 12px;
        }
        #w {
            background: #04030d;
            border-radius: 12px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.8);
            width: 100%;
            max-width: 560px;
        }
        .title {
            color: rgba(255,255,255,0.75);
            font-size: 14px;
            letter-spacing: 0.1em;
            font-family: monospace;
        }
        #cw {
            position: relative;
            cursor: crosshair;
            width: 100%;
            max-width: 100%;
        }
        canvas {
            display: block;
            border-radius: 8px;
            width: 100%;
            height: auto;
            max-height: 82vh;
        }
        #oc {
            position: absolute;
            top: 0; left: 0;
            pointer-events: none;
            border-radius: 8px;
            width: 100%; height: 100%;
        }
        #bot {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            padding: 0 4px;
        }
        #clr {
            background: rgba(255,255,255,0.05);
            border: 0.5px solid rgba(255,255,255,0.15);
            color: rgba(255,255,255,0.5);
            padding: 7px 16px;
            border-radius: 5px;
            font-size: 11px;
            cursor: pointer;
            font-family: monospace;
        }
        #clr:hover { background: rgba(255,255,255,0.12); color: #fff; }
        #st, #hint {
            color: rgba(255,255,255,0.3);
            font-size: 11px;
            font-family: monospace;
            letter-spacing: 0.03em;
        }
        #hint { text-align: center; }
    </style>
</head>
<body>
    <div id="w">
        <div class="title">MUSICAL MANDELBROT — TAP TO COMPOSE</div>
        
        <div id="cw">
            <canvas id="mc" width="530" height="500"></canvas>
            <canvas id="oc" width="530" height="500"></canvas>
        </div>
        
        <div id="bot">
            <button id="clr">clear all voices</button>
            <span id="st">tap anywhere — the orbit becomes the melody</span>
        </div>
        
        <div id="hint">
            boundary points yield the longest symphonies · each tap adds a voice · voices layer into harmony
        </div>
    </div>

    <script>
        window.addEventListener('load', function() {
            (function() {
                const logicalW = 530, logicalH = 500;
                const XMIN = -2.5, XMAX = 1.0, YMIN = -1.6, YMAX = 1.6;
                const MXITER = 180;

                const mc = document.getElementById('mc');
                const mctx = mc.getContext('2d', { alpha: false });
                const oc = document.getElementById('oc');
                const octx = oc.getContext('2d');

                let currentScaleX = 1, currentScaleY = 1;

                // Render Mandelbrot (unchanged math)
                function renderMandelbrot() {
                    const img = mctx.createImageData(logicalW, logicalH);
                    // ... (paste your exact original Mandelbrot loop here - the for py/px loop with color calculation)
                    // I'll keep it short for now - use the same code from your original
                    mctx.putImageData(img, 0, 0);
                }

                // Your full original functions (orbit, noteFreq, toP, playVoice, etc.) go here unchanged

                // Improved interaction handler that works better on mobile
                function handleInteraction(e) {
                    e.preventDefault();
                    const rect = mc.getBoundingClientRect();
                    
                    let clientX, clientY;
                    if (e.touches && e.touches.length > 0) {
                        clientX = e.touches[0].clientX;
                        clientY = e.touches[0].clientY;
                    } else {
                        clientX = e.clientX;
                        clientY = e.clientY;
                    }

                    const px = (clientX - rect.left) * (logicalW / rect.width);
                    const py = (clientY - rect.top) * (logicalH / rect.height);

                    const cx = XMIN + (px / logicalW) * (XMAX - XMIN);
                    const cy = YMIN + (py / logicalH) * (YMAX - YMIN);

                    const pts = orbit(cx, cy);           // your orbit function
                    const pal = PALS[ci % PALS.length];
                    ci++;

                    allTO = allTO.concat(playVoice(pts, pal));

                    const sign = cy >= 0 ? ' + ' : ' - ';
                    document.getElementById('st').textContent = 
                        pts.length + ' steps · ' + cx.toFixed(5) + sign + Math.abs(cy).toFixed(5) + 'i';
                }

                // Attach both click and touchstart (touchstart is more reliable on iOS)
                mc.addEventListener('click', handleInteraction);
                mc.addEventListener('touchstart', handleInteraction, { passive: false });

                // Clear button
                document.getElementById('clr').addEventListener('click', () => {
                    allTO.forEach(clearTimeout);
                    allTO = [];
                    ci = 0;
                    octx.clearRect(0, 0, oc.width, oc.height);
                    if (actx) actx.close().then(() => { actx = null; });
                    document.getElementById('st').textContent = 'cleared · tap to compose again';
                });

                // Initial render
                renderMandelbrot();

            })();
        });
    </script>
</body>
</html>
